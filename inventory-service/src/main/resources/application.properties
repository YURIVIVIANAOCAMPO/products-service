server.port=8081
spring.application.name=inventory-service

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/inventorydb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=validate

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Security
security.api-key=inventory-secret-key

# Products Service URL
products.service.url=${PRODUCTS_SERVICE_URL:http://localhost:8080}
