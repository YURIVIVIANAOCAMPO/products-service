spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/store}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.jpa.show-sql=true

# Logging with Correlation ID
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{correlation-id}] %-5level %logger{36} - %msg%n

# Inventory Service Configuration
server.port=${PORT:8080}
inventory.service.url=${INVENTORY_SERVICE_URL:http://localhost:8081}
security.api-key=${INVENTORY_API_KEY:inventory-secret-key}

# Resilience4j Retry Configuration
resilience4j.retry.instances.inventoryService.max-attempts=3
resilience4j.retry.instances.inventoryService.wait-duration=2s
spring.flyway.table=flyway_schema_history_products